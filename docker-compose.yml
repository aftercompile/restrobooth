services:
  postgres:
    # pgvector/pgvector, not stock postgres — the vector extension isn't
    # available in the stock image, and this matches what Supabase's own
    # Postgres actually ships (their images are built on this same base).
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: restrobooth
      POSTGRES_PASSWORD: restrobooth
      POSTGRES_DB: restrobooth
    ports:
      - "54329:5432"
    volumes:
      - restrobooth-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restrobooth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  restrobooth-pg:
