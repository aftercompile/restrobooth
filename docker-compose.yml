services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: restrobooth
      POSTGRES_PASSWORD: restrobooth
      POSTGRES_DB: restrobooth
    ports:
      - "54329:5432"
    volumes:
      - restrobooth-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restrobooth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  restrobooth-pg:
